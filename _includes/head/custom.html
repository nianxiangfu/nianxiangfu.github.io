<meta name="google-site-verification" content="0tzVDy_cRAwgjeeQRZQpCeJVIuFV_1uRNzOwebuiqQ0" />

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css">

<!-- Support for Font Awesome -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/fontawesome.css">

<meta name="theme-color" content="var(--global-bg-color)"/>

<script>
  (function() {
    var cookieName = "site-theme";

    window.getStoredColorTheme = function() {
      try {
        var localTheme = window.localStorage && window.localStorage.getItem("theme");
        if (localTheme === "dark" || localTheme === "light") {
          return localTheme;
        }
      } catch (error) {
        // Fall back to a cookie when storage is blocked.
      }

      var cookieMatch = document.cookie.match(new RegExp("(?:^|; )" + cookieName + "=([^;]*)"));
      var cookieTheme = cookieMatch ? decodeURIComponent(cookieMatch[1]) : null;
      return cookieTheme === "dark" || cookieTheme === "light" ? cookieTheme : null;
    };

    window.setStoredColorTheme = function(theme) {
      try {
        if (window.localStorage) {
          window.localStorage.setItem("theme", theme);
          return;
        }
      } catch (error) {
        // Fall back to a cookie when storage is blocked.
      }

      document.cookie = cookieName + "=" + encodeURIComponent(theme) + "; path=/; max-age=31536000; SameSite=Lax";
    };

    window.applyColorTheme = function(theme) {
      var root = document.documentElement;
      if (theme === "dark") {
        root.setAttribute("data-theme", "dark");
      } else {
        root.removeAttribute("data-theme");
      }

      var checkbox = document.getElementById("theme-toggle-checkbox");
      if (checkbox) {
        checkbox.checked = theme === "dark";
      }
    };

    if (window.getStoredColorTheme() === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    }

    document.addEventListener("DOMContentLoaded", function() {
      var checkbox = document.getElementById("theme-toggle-checkbox");
      if (!checkbox) {
        return;
      }

      checkbox.checked = document.documentElement.hasAttribute("data-theme");
      checkbox.addEventListener("change", function() {
        var theme = checkbox.checked ? "dark" : "light";
        window.applyColorTheme(theme);
        window.setStoredColorTheme(theme);
      });
    });
  }());
</script>

<!-- end custom head snippets -->
